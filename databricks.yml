bundle:
  name: cartola_fc_pipeline

variables:
  catalog: cartola_fc
  schema_bronze: bronze
  schema_silver: silver
  schema_gold: gold
  schema_models: models

workspace:
  host: ${DATABRICKS_HOST}

artifacts:
  dbt_project:
    type: dbt
    project_directory: .
    profiles_directory: ~/.dbt

targets:
  dev:
    mode: development
    workspace:
      host: ${DATABRICKS_HOST}

  prod:
    mode: production
    workspace:
      host: ${DATABRICKS_HOST}
    run_as:
      service_principal_name: ${DATABRICKS_SP_NAME}

include:
  - resources/cartola_pipeline.job.yml
