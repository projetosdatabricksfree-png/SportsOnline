resources:
  jobs:
    cartola_pipeline:
      name: "[${bundle.target}] Cartola FC — Pipeline Completo"
      description: "Pipeline ELT + ML do Cartola FC. Bronze → Silver → Gold → Modelos ML"

      schedule:
        quartz_cron_expression: "0 */15 * * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: PAUSED

      tasks:

        # ── FASE 1: Ingestão Bronze ──────────────────────────────────────────
        - task_key: ingestao_bronze
          description: "Chama APIs Cartola FC e faz upsert nas tabelas Delta bronze.*"
          notebook_task:
            notebook_path: ../notebooks/01_ingestao_bronze.py
            warehouse_id: 1cd6c43abd7c4760
          timeout_seconds: 600
          retry_on_timeout: true
          max_retries: 2

        # ── FASE 2: dbt Seeds + Bronze (stg_* views) ────────────────────────
        - task_key: dbt_bronze
          description: "Executa seeds e modelos stg_* da camada bronze"
          depends_on:
            - task_key: ingestao_bronze
          notebook_task:
            notebook_path: ../notebooks/run_dbt.py
            base_parameters:
              dbt_command: "seed && dbt run --select bronze"
            warehouse_id: 1cd6c43abd7c4760
          timeout_seconds: 600

        # ── FASE 3: dbt Silver (dim_* + fct_*) ──────────────────────────────
        - task_key: dbt_silver
          description: "Executa modelos dim_* e fct_* da camada silver + snapshot + testes"
          depends_on:
            - task_key: dbt_bronze
          notebook_task:
            notebook_path: ../notebooks/run_dbt.py
            base_parameters:
              dbt_command: "run --select silver && dbt snapshot && dbt test --select silver"
            warehouse_id: 1cd6c43abd7c4760
          timeout_seconds: 900

        # ── FASE 4: dbt Gold ─────────────────────────────────────────────────
        - task_key: dbt_gold
          description: "Executa modelos Gold (métricas + feature store) e roda testes"
          depends_on:
            - task_key: dbt_silver
          notebook_task:
            notebook_path: ../notebooks/run_dbt.py
            base_parameters:
              dbt_command: "build --select gold"
            warehouse_id: 1cd6c43abd7c4760
          timeout_seconds: 1200

        # ── FASE 5a: XGBoost (paralelo) ──────────────────────────────────────
        - task_key: ml_xgboost
          description: "Treina XGBoost e gera previsões para a próxima rodada"
          depends_on:
            - task_key: dbt_gold
          notebook_task:
            notebook_path: ../notebooks/02_ml_xgboost.py
            warehouse_id: 1cd6c43abd7c4760
          timeout_seconds: 1800

        # ── FASE 5b: LightGBM (paralelo) ─────────────────────────────────────
        - task_key: ml_lightgbm
          description: "Treina LightGBM com SHAP e gera previsões"
          depends_on:
            - task_key: dbt_gold
          notebook_task:
            notebook_path: ../notebooks/03_ml_lightgbm.py
            warehouse_id: 1cd6c43abd7c4760
          timeout_seconds: 1800

        # ── FASE 5c: Poisson (paralelo) ───────────────────────────────────────
        - task_key: ml_poisson
          description: "Treina Poisson-Bayesiano e gera previsões com intervalos de credibilidade"
          depends_on:
            - task_key: dbt_gold
          notebook_task:
            notebook_path: ../notebooks/04_ml_poisson.py
            warehouse_id: 1cd6c43abd7c4760
          timeout_seconds: 1800

        # ── FASE 6: Meta-Modelo ───────────────────────────────────────────────
        - task_key: meta_modelo
          description: "Avalia coverage dos 3 modelos e gera previsão final"
          depends_on:
            - task_key: ml_xgboost
            - task_key: ml_lightgbm
            - task_key: ml_poisson
          notebook_task:
            notebook_path: ../notebooks/05_meta_modelo.py
            warehouse_id: 1cd6c43abd7c4760
          timeout_seconds: 600
